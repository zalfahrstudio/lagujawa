<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZalfahrStudio Player</title>

    <style>
      body {
        margin: 0;
        background: black;
        font-family: Arial;
        color: white;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* PLAYER CARD */

      .player {
        width: 92%;
        max-width: 380px;
        padding: 25px;
        border-radius: 25px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(18px);
        box-shadow: 0 0 50px rgba(0, 200, 255, 0.35);
        text-align: center;
      }

      /* COVER */

      .cover {
        width: 70%;
        max-width: 220px;
        aspect-ratio: 1/1;
        margin: auto;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 0 35px rgba(0, 200, 255, 0.6);
      }

      .cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* TITLE */

      #songTitle {
        margin-top: 15px;
        font-size: 18px;
      }

      /* PROGRESS */

      .progress-container {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        margin-top: 15px;
        cursor: pointer;
      }

      .progress {
        height: 100%;
        width: 0%;
        background: #00ccff;
        border-radius: 20px;
        box-shadow: 0 0 8px #00ccff;
      }

      /* TIME */

      .time {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-top: 5px;
        opacity: 0.8;
      }

      /* CONTROLS */

      .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 28px;
        margin: 20px 0;
      }

      .btn {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn svg {
        width: 22px;
        height: 22px;
        fill: white;
      }

      .btn:hover {
        background: #00ccff;
      }

      .play {
        width: 78px;
        height: 78px;
        background: #00ccff;
        box-shadow: 0 0 35px #00ccff;
      }

      .play svg {
        width: 28px;
        height: 28px;
      }

      /* PLAYLIST */

      .playlist {
        max-height: 160px;
        overflow: auto;
        margin-top: 10px;
        padding-right: 5px;
      }

      .playlist::-webkit-scrollbar {
        width: 5px;
      }

      .playlist::-webkit-scrollbar-thumb {
        background: #00ccff;
        border-radius: 10px;
      }

      .playlist li {
        list-style: none;
        padding: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        cursor: pointer;
      }

      .active {
        color: #00ccff;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="player">
      <div class="cover">
        <img id="coverImg" src="cover1.jpg" />
      </div>

      <div id="songTitle">Loading...</div>

      <div class="progress-container" id="progressContainer">
        <div class="progress" id="progress"></div>
      </div>

      <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>

      <audio id="audio"></audio>

      <div class="controls">
        <div onclick="prevSong()" class="btn">
          <svg viewBox="0 0 24 24">
            <path d="M6 6h2v12H6zM9 12l9 6V6z" />
          </svg>
        </div>

        <div onclick="togglePlay()" class="btn play" id="playBtn">
          <svg id="playIcon" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z" />
          </svg>
        </div>

        <div onclick="nextSong()" class="btn">
          <svg viewBox="0 0 24 24">
            <path d="M16 6h2v12h-2zM6 18l9-6-9-6z" />
          </svg>
        </div>
      </div>

      <h3>Playlist</h3>
      <ul id="playlist" class="playlist"></ul>
    </div>

    <script>
      const songs = [
        { title: "DJ All In For You", file: "lagu1.mp3", cover: "cover1.jpg" },
        { title: "DJ Tulus", file: "lagu2.mp3", cover: "cover2.jpg" },
        { title: "DJ Sigar", file: "lagu3.mp3", cover: "cover3.jpg" },
      ];

      const audio = document.getElementById("audio");
      const playlist = document.getElementById("playlist");
      const title = document.getElementById("songTitle");
      const progress = document.getElementById("progress");
      const progressContainer = document.getElementById("progressContainer");
      const cover = document.getElementById("coverImg");
      const playIcon = document.getElementById("playIcon");

      let index = 0;

      /* BUILD PLAYLIST */

      songs.forEach((song, i) => {
        let li = document.createElement("li");

        li.innerText = song.title;

        li.onclick = () => {
          load(i);
          audio.play();
          updateIcon(true);
        };

        playlist.appendChild(li);
      });

      function load(i) {
        index = i;

        audio.src = songs[i].file;

        title.innerText = songs[i].title;

        cover.src = songs[i].cover;

        document
          .querySelectorAll("li")
          .forEach((e) => e.classList.remove("active"));

        playlist.children[i].classList.add("active");
      }

      load(0);

      /* PLAY CONTROL */

      function togglePlay() {
        if (audio.paused) {
          audio.play();
          updateIcon(true);
        } else {
          audio.pause();
          updateIcon(false);
        }
      }

      function updateIcon(state) {
        playIcon.innerHTML = state
          ? '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>'
          : '<path d="M8 5v14l11-7z"/>';
      }

      /* NEXT PREV */

      function nextSong() {
        index = (index + 1) % songs.length;

        load(index);

        audio.play();

        updateIcon(true);
      }

      function prevSong() {
        index = (index - 1 + songs.length) % songs.length;

        load(index);

        audio.play();

        updateIcon(true);
      }

      /* AUTO NEXT */

      audio.addEventListener("ended", nextSong);

      /* PROGRESS */

      audio.addEventListener("timeupdate", () => {
        progress.style.width = (audio.currentTime / audio.duration) * 100 + "%";
      });

      progressContainer.onclick = (e) => {
        audio.currentTime =
          (e.offsetX / progressContainer.clientWidth) * audio.duration;
      };
    </script>
  </body>
</html>
